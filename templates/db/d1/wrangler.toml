# 概要: Cloudflare Workers / D1 の設定。
#       database_id は Cloudflare ダッシュボードで作成後、`wrangler d1 create <name>` の出力をここに貼る。
#       D1 マイグレーションは drizzle-kit generate で生成し、`wrangler d1 migrations apply` で適用する。
name = "harness-app"
main = "src/main.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "harness-prod"
database_id = "REPLACE_WITH_CLOUDFLARE_D1_DATABASE_ID"
migrations_dir = "drizzle"

[env.staging]
name = "harness-app-staging"
[[env.staging.d1_databases]]
binding = "DB"
database_name = "harness-stage"
database_id = "REPLACE_WITH_STAGING_D1_DATABASE_ID"
migrations_dir = "drizzle"
