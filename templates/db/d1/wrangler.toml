# 概要: Cloudflare Workers / D1 の設定（wrangler が読む）。
#       database_id は Alchemy v2 が `dev/alchemy.run.ts` のリソース宣言から作成する。
#       初回 `bunx alchemy deploy --stage <env>` 後、以下で実 ID を取り出してこのファイルに反映する：
#         nix develop --command bunx alchemy state get harness <stage> Db | jq -r .id
#       D1 マイグレーションは drizzle-kit generate で SQL 生成し、
#       `wrangler d1 migrations apply DB --env <env> --remote` で適用する。
#       wrangler.toml と wrangler.jsonc は両方とも wrangler が受理する。本テンプレは
#       既存ツール互換のため .toml を残しているが、Alchemy v2 公式ドキュメントは .jsonc を案内。
name = "harness-app"
main = "src/main.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "harness-prod"
database_id = "REPLACE_WITH_CLOUDFLARE_D1_DATABASE_ID"
migrations_dir = "drizzle"

[env.staging]
name = "harness-app-staging"
[[env.staging.d1_databases]]
binding = "DB"
database_name = "harness-stage"
database_id = "REPLACE_WITH_STAGING_D1_DATABASE_ID"
migrations_dir = "drizzle"
