# k6 smoke load test — keeps regressions in throughput / p95 latency from
# slipping into stage. Real load tests (sustained, realistic mix) run
# manually before launches; this one is the cheap CI gate.

name: k6 Smoke

on:
  pull_request:
    branches: [stage]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run k6 smoke
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/load/smoke.js
        env:
          BASE_URL: ${{ vars.STAGE_URL }}

      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary
          path: summary.json
