# Generate CycloneDX SBOM on every release tag and attach it to the GitHub
# Release. Required for supply-chain audits per rules/production.md.

name: SBOM

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - run: pnpm install --frozen-lockfile

      # cdxgen は npm / pnpm / yarn / bun を auto-detect する。pnpm-lock.yaml も
      # 含めて scan するので、pnpm 環境でも正確な SBOM を生成できる。
      - name: Generate SBOM (CycloneDX cdxgen)
        run: pnpm dlx @cyclonedx/cdxgen@latest -o sbom.cdx.json --spec-version 1.5

      - name: Attach SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.cdx.json
