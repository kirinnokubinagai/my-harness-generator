# 概要: 履歴全体の機密スキャンを毎日 03:00 JST に実行する。
#       過去のコミットで漏れた機密を継続的に検出する。

name: Scheduled - Secrets History Scan

on:
  schedule:
    - cron: '0 18 * * *'  # UTC 18:00 = JST 03:00
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  history-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@v18
      - name: gitleaks 履歴全体スキャン
        run: nix develop --command gitleaks detect --redact --config .gitleaks.toml --log-opts="--all --full-history"
      - if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const maybeCreateIssue = require('./.github/scripts/maybe-create-issue.js');
            await maybeCreateIssue({ github, context, core }, {
              title: '[security:gitleaks] 履歴スキャンで機密検出',
              labels: ['security', 'priority/p0'],
              body: `履歴全体の gitleaks スキャンで機密を検出しました。\nrun: ${context.payload.repository.html_url}/actions/runs/${context.runId}\n\n対応: 該当コミットを git filter-repo で除去し、関連シークレットを即時ローテーションしてください。`,
            });
