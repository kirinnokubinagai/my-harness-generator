# 概要: 再利用可能な E2E テスト（Playwright + Maestro）。
#       実行結果サマリー + スクリーンショットを PR コメントに自動投稿する。
#       失敗時は GitHub issue を自動起票して該当レーンに修正を戻す。

name: Reusable - E2E

on:
  workflow_call:
    inputs:
      base_url:
        description: テスト対象のベース URL（vars.STAGE_URL や localhost）
        type: string
        required: true
      environment_name:
        description: 環境名（dev / stage / prod）
        type: string
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  playwright:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ inputs.base_url }}
      ENVIRONMENT_NAME: ${{ inputs.environment_name }}
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@v18
      - run: nix develop --command pnpm install --frozen-lockfile
      - run: nix develop --command pnpm exec playwright test --reporter=list,html

      - name: Playwright レポートを保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ inputs.environment_name }}
          path: playwright-report/
          retention-days: 14

      - name: Playwright スクリーンショットを保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-${{ inputs.environment_name }}
          path: test-results/
          retention-days: 14

      - name: PR にサマリーをコメント
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.existsSync('playwright-report/index.html')
              ? '✅ Playwright 完了。レポートは Actions の artifacts からダウンロードしてください。'
              : '❌ Playwright が走りきれませんでした。';
            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              body: `### Playwright 結果（${{ inputs.environment_name }}）\n\n${summary}\n\n- レポート: \`playwright-report-${{ inputs.environment_name }}\`\n- スクリーンショット: \`playwright-screenshots-${{ inputs.environment_name }}\`\n- ログ: ${context.payload.repository.html_url}/actions/runs/${context.runId}`,
            });

      - name: 失敗時に issue 起票
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const maybeCreateIssue = require('./.github/scripts/maybe-create-issue.js');
            await maybeCreateIssue({ github, context, core }, {
              title: `[e2e:playwright] failed (${{ inputs.environment_name }})`,
              labels: ['e2e', 'priority/p1'],
              body: `Playwright が ${{ inputs.environment_name }} で失敗しました。\n\nrun: ${context.payload.repository.html_url}/actions/runs/${context.runId}`,
            });

  maestro:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@v18
      - name: iOS シミュレータ起動（ヘッドレス）
        run: |
          xcrun simctl boot "iPhone 16" || true
          xcrun simctl bootstatus "iPhone 16" -b

      - name: Maestro 実行（ヘッドレス）
        run: nix develop --command maestro --device booted test tests/e2e/mobile

      - name: Maestro スクショを保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots-${{ inputs.environment_name }}
          path: ~/.maestro/tests/
          retention-days: 14

      - name: PR にサマリーをコメント
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              body: `### Maestro 結果（${{ inputs.environment_name }}）\n\n- スクショ: \`maestro-screenshots-${{ inputs.environment_name }}\`\n- ログ: ${context.payload.repository.html_url}/actions/runs/${context.runId}`,
            });

      - name: 失敗時に issue 起票
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const maybeCreateIssue = require('./.github/scripts/maybe-create-issue.js');
            await maybeCreateIssue({ github, context, core }, {
              title: `[e2e:maestro] failed (${{ inputs.environment_name }})`,
              labels: ['e2e', 'priority/p1'],
              body: `Maestro が ${{ inputs.environment_name }} で失敗しました。\n\nrun: ${context.payload.repository.html_url}/actions/runs/${context.runId}`,
            });
