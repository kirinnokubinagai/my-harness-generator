# Auto-installed by scripts/setup-oci-vm.sh into /etc/logrotate.d/daily-progress
# on Oracle Linux 9 (ARM64, A1.Flex). Rotated by /etc/cron.daily/logrotate.
#
# Why these specific settings:
#   weekly + rotate 4    → 4 weeks of history is enough for retro debugging
#                          without ballooning disk usage on the 47 GB root.
#   compress             → gzip rotated files (cron.log.1.gz, cron.log.2.gz, ...)
#   delaycompress        → keep the most recent rotation uncompressed so the
#                          previous week is still grep-able without zgrep.
#   missingok            → don't error if cron.log doesn't exist yet (= bot
#                          hasn't run once after a fresh deploy).
#   notifempty           → skip rotation when the file is empty (avoids
#                          producing a string of empty .gz files when the
#                          project is dormant).
#   copytruncate         → CRITICAL. daily-progress.sh and event-watch.sh
#                          both `>>` to this file from cron. The default
#                          rename-then-create strategy would silently
#                          orphan any in-flight write because the file
#                          descriptor still points at the renamed file.
#                          copytruncate copies the content then truncates
#                          the same inode, so the appenders keep writing
#                          to a now-empty file without any restart.
#   create 0600 opc opc  → if the bot is dormant long enough that
#                          copytruncate's "leave the file in place" wins,
#                          new files inherit opc:opc 600 (matches what
#                          daily-progress.sh writes).
#   dateext              → rotated files are cron.log-YYYYMMDD.gz instead
#                          of cron.log.1.gz / cron.log.2.gz. Easier to
#                          eyeball which week is which.
#   dateformat -%Y%m%d   → ISO-style date suffix (default -%s is the unix
#                          timestamp, which is unreadable).
#   olddir /var/log/daily-progress  → keep rotated files out of the bot's
#                          working dir so `ls ~/daily-progress-bot/` stays
#                          clean and so cron.log.* aren't picked up by
#                          accident if the bot ever globs over its own dir.

/home/opc/daily-progress-bot/cron.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    create 0600 opc opc
    dateext
    dateformat -%Y%m%d
    olddir /var/log/daily-progress
    su opc opc
}
