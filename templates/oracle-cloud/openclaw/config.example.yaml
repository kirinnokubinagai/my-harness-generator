# OpenClaw gateway configuration for OCI VM deployment.
# Generated by my-harness-generator 7.30.0 (2026-05-14).
#
# This file is a TEMPLATE — ensure-openclaw-config.sh + setup-oci-vm-nixos.sh
# substitute ${VAR} placeholders at deploy time and write the rendered copy to
# ~/.openclaw/openclaw.json on the OCI VM (chmod 600).
#
# OpenClaw reads this file from ~/.openclaw/openclaw.json by default.
# Secrets (DISCORD_BOT_TOKEN, API keys) also go in /home/opc/openclaw/.env
# (EnvironmentFile for the systemd service) and NOT here in plain text.
#
# Schema reference: https://docs.openclaw.ai/gateway/configuration
# If OpenClaw upgrades break this schema, re-generate via:
#   bash scripts/ensure-openclaw-config.sh <root>

# ---------------------------------------------------------------------------
# AI Agent model — provider/model format
# ${OPENCLAW_PROVIDER_BLOCK} is substituted at deploy time by
# setup-oci-vm-nixos.sh into ONE of the four stanzas below
# (based on ai_provider from .my-harness/.openclaw-config.json):
#
#   codex        → CLIProxyAPI on localhost:8317 (ChatGPT Plus/Pro sub)
#   claude-code  → CLIProxyAPI on localhost:8317 (Claude Pro/Max sub)
#   openrouter   → direct connection, OPENROUTER_API_KEY env var
#   claude-api   → direct connection, ANTHROPIC_API_KEY env var
#
# Reference stanzas (substituted at deploy time):
#
#   ## codex / claude-code (CLIProxyAPI — openai-compatible on localhost:8317):
#   agents:
#     defaults:
#       model:
#         primary: "openai/gpt-5.4-mini"     # or claude-sonnet-4-6 for claude-code
#       providers:
#         openai:
#           baseUrl: "http://localhost:8317/v1"
#           apiKey: ""
#
#   ## openrouter:
#   agents:
#     defaults:
#       model:
#         primary: "anthropic/claude-sonnet-4"
#       providers:
#         openrouter:
#           apiKey: "${OPENROUTER_API_KEY}"   # read from .env via EnvironmentFile
#
#   ## claude-api:
#   agents:
#     defaults:
#       model:
#         primary: "anthropic/claude-sonnet-4-6"
#       providers:
#         anthropic:
#           apiKey: "${ANTHROPIC_API_KEY}"    # read from .env via EnvironmentFile
# ---------------------------------------------------------------------------
${OPENCLAW_PROVIDER_BLOCK}

# ---------------------------------------------------------------------------
# Discord integration
# botToken is read from the environment variable DISCORD_BOT_TOKEN (set in .env).
# See templates/oracle-cloud/openclaw/SETUP.md for Discord bot setup steps.
# ---------------------------------------------------------------------------
channels:
  discord:
    enabled: true
    botToken: "${DISCORD_BOT_TOKEN}"
    # dmPolicy controls who can DM the bot:
    #   pairing  — users must be paired (via /pair command) before DMing
    #   open     — anyone can DM the bot (less restrictive)
    #   disabled — DMs disabled, bot only responds in channels
    dmPolicy: "pairing"
    homeChannel: "${DISCORD_HOME_CHANNEL_NAME}"
    appChannel: "${DISCORD_APP_CHANNEL_NAME}"

# Session binding — thread-per-conversation (good for Discord channels)
session:
  threadBindings:
    enabled: true
    idleHours: 24
    maxAgeHours: 0   # 0 = no maximum age; threads persist until idle timeout

# ---------------------------------------------------------------------------
# Cron / automation
# The daily-report job is registered by register-agent-daily-report.sh
# via: openclaw cron add --name daily-report --cron "0 9 * * *" ...
# ---------------------------------------------------------------------------
cron:
  enabled: true
  maxConcurrentRuns: 2
  sessionRetention: "24h"
  runLog:
    maxBytes: "2mb"
    keepLines: 2000

# ---------------------------------------------------------------------------
# Voice — ElevenLabs TTS (optional) + built-in STT
# The OCI VM is headless: CLI interactive voice is disabled.
# Discord voice channel mode works without a physical mic (audio via Discord API).
# If ELEVENLABS_API_KEY is not set in .env, system TTS fallback is used.
# ---------------------------------------------------------------------------
# voice:
#   tts:
#     provider: "elevenlabs"        # or "system" for OS-default synthesis
#     elevenlabs:
#       apiKey: "${ELEVENLABS_API_KEY}"  # set in .env; omit to use system TTS
#       voiceId: "default"
#   stt:
#     provider: "built-in"          # OpenClaw's built-in transcription (no local model)

# ---------------------------------------------------------------------------
# Memory + agent behaviour
# ---------------------------------------------------------------------------
agents:
  defaults:
    maxTurns: 90
    tools:
      exec: true
      read: true
    memory:
      enabled: true

# ---------------------------------------------------------------------------
# Display — optimised for headless/gateway (no ANSI chrome)
# ---------------------------------------------------------------------------
display:
  streaming: false
  compact: true
  language: "ja"    # change to "en" if you prefer English responses
