# CLIProxyAPI configuration for my-harness-generator OCI VM.
# Generated by setup-oci-vm-nixos.sh / setup-oci-vm.sh at deploy time.
# ${ENABLE_CODEX} and ${ENABLE_CLAUDE_CODE} are substituted at deploy time
# (mutually exclusive: exactly one is "true", the other "false").
#
# Reference: https://github.com/router-for-me/CLIProxyAPI
# Default port: 8317  |  OpenAI-compatible endpoint: /v1/chat/completions
#
# Auth discovery (automatic — no explicit path config needed):
#   codex       → CLIProxyAPI reads ~/.codex/auth.json (deployed by ensure-codex-auth.sh)
#   claude-code → CLIProxyAPI reads ~/.claude/.credentials.json (from claude setup-token)

# Bind to localhost only — Hermes talks to us on 127.0.0.1:8317.
# NEVER expose this port publicly; the OAuth tokens grant subscription-level access.
host: "127.0.0.1"
port: 8317

# TLS is not needed for localhost-only operation.
tls:
  enable: false
  cert: ""
  key: ""

# Management API — disabled for security on a production VM.
remote-management:
  allow-remote: false
  secret-key: ""
  disable-control-panel: true

# Auth directory for CLIProxyAPI's own state cache.
# OAuth credential files (auth.json / .credentials.json) are auto-discovered
# from their standard locations (~/.codex/ and ~/.claude/) — not from auth-dir.
auth-dir: "~/.cli-proxy-api"

# No API-key auth for the proxy itself — it only listens on localhost.
# Leave empty so Hermes can call it without any Authorization header.
api-keys: []

# Logging — write to journal (stdout), not files.
logging-to-file: false
debug: false

# Usage stats — disabled to reduce overhead.
usage-statistics-enabled: false

# Retry failed requests up to 3 times (handles transient OAuth refresh races).
request-retry: 3

# ---------------------------------------------------------------------------
# Codex CLI OAuth provider
# Reads ~/.codex/auth.json automatically (deployed by ensure-codex-auth.sh).
# Enable when HERMES_AI_PROVIDER=codex; disable otherwise.
# ---------------------------------------------------------------------------
# NOTE: The "codex" OAuth channel (file-based auth) is distinct from
# "codex-api-key" (API key entries). No api-key entry is needed here;
# CLIProxyAPI discovers the OAuth session from ~/.codex/auth.json.
#
# When enabled, models from the Codex OAuth session are visible at /v1/models
# and routable via /v1/chat/completions (standard OpenAI-compatible path).
# Typical model IDs exposed: gpt-5, gpt-4o, gpt-4.1, etc.
# (exact list depends on your ChatGPT Plus/Pro tier and what OpenAI exposes
# to the Codex CLI at the time of the request)

# codex OAuth is controlled via the oauth-excluded-models / oauth-model-alias
# mechanism. When ${ENABLE_CODEX}=false we exclude all codex models so the
# channel is effectively disabled without removing the config block.

# ---------------------------------------------------------------------------
# Claude Code CLI OAuth provider
# Reads ~/.claude/.credentials.json automatically (from `claude setup-token`).
# Enable when HERMES_AI_PROVIDER=claude-code; disable otherwise.
# ---------------------------------------------------------------------------
# When enabled, Claude models from your Pro/Max subscription are visible at
# /v1/models and routable via /v1/chat/completions.
# Typical model IDs: claude-sonnet-4-5-20250929, claude-opus-4-5-20251101, etc.

# Per-provider enable/disable via model exclusion wildcards.
# When a provider is "disabled" we exclude all its models (*) so Hermes gets
# an empty model list for that provider channel and routes to the other.
oauth-excluded-models:
  codex:
    # ${CODEX_EXCLUDED}: substituted to "" (no exclusions) when codex is enabled,
    # or "- '*'" (exclude everything) when codex is disabled.
    ${CODEX_EXCLUDED}
  claude:
    # ${CLAUDE_EXCLUDED}: substituted to "" (no exclusions) when claude-code is enabled,
    # or "- '*'" (exclude everything) when claude-code is disabled.
    ${CLAUDE_EXCLUDED}

# ---------------------------------------------------------------------------
# Model aliases (optional quality-of-life)
# Expose stable alias names so Hermes config.yaml doesn't need to track
# exact versioned model IDs that change with CLI updates.
# ---------------------------------------------------------------------------
oauth-model-alias:
  codex:
    # Expose "hermes-codex-default" → latest gpt-5 from Codex OAuth session.
    # Hermes config.yaml uses: model.default: hermes-codex-default
    - name: "gpt-5"
      alias: "hermes-codex-default"
      fork: true   # keep original gpt-5 in the list too
  claude:
    # Expose "hermes-claude-default" → sonnet from Claude Code OAuth session.
    # Hermes config.yaml uses: model.default: hermes-claude-default
    - name: "claude-sonnet-4-5-20250929"
      alias: "hermes-claude-default"
      fork: true
