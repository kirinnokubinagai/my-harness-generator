# Hermes Agent configuration for OCI VM deployment.
# Generated by my-harness-generator 7.25.0 (2026-05-14).
#
# This file is a TEMPLATE — ensure-hermes-config.sh substitutes
# ${VAR} placeholders at deploy time and writes the rendered copy to
# ~/hermes-agent/config.yaml on the OCI VM (chmod 600).
#
# Secrets (DISCORD_BOT_TOKEN, OPENAI_API_KEY) go in ~/hermes-agent/.env,
# NOT here. Hermes reads both files; ~/.hermes/.env is the canonical
# location but ~/hermes-agent/.env is symlinked (see hermes-agent.nix).
#
# Schema reference: https://hermes-agent.nousresearch.com/docs/user-guide/configuration
# If Hermes upgrades break this schema, re-generate via:
#   bash scripts/ensure-hermes-config.sh <root>

# ---------------------------------------------------------------------------
# AI Model — provider stanza
# ${HERMES_PROVIDER_BLOCK} is substituted at deploy time by
# setup-oci-vm-nixos.sh / setup-oci-vm.sh into ONE of the four stanzas
# below (based on ai_provider from .my-harness/.hermes-config.json):
#
#   codex        → CLIProxyAPI on localhost:8317 (ChatGPT Plus/Pro sub)
#   claude-code  → CLIProxyAPI on localhost:8317 (Claude Pro/Max sub)
#   openrouter   → direct connection, OPENROUTER_API_KEY env var
#   claude-api   → direct connection, ANTHROPIC_API_KEY env var
#
# Reference stanzas (do not edit this comment — regenerated by setup scripts):
#
#   ## codex / claude-code (CLIProxyAPI):
#   model:
#     provider: custom
#     default: hermes-codex-default      # or hermes-claude-default
#     base_url: http://localhost:8317/v1
#     api_key: ""                        # CLIProxyAPI requires no auth on localhost
#
#   ## openrouter:
#   model:
#     provider: openrouter
#     default: anthropic/claude-sonnet-4
#     # OPENROUTER_API_KEY env var is read by Hermes from .env
#
#   ## claude-api:
#   model:
#     provider: anthropic
#     default: claude-sonnet-4-6
#     # ANTHROPIC_API_KEY env var is read by Hermes from .env
# ---------------------------------------------------------------------------
${HERMES_PROVIDER_BLOCK}

# ---------------------------------------------------------------------------
# Voice — STT + TTS
# Both providers are local / on-device, no external API, ARM64-compatible.
#
#   STT: local Whisper Tiny (~75 MB) — free, no external API key.
#        faster-whisper is installed by Hermes's install.sh automatically.
#   TTS: NeuTTS Air (~500 MB model, downloaded on first use) — free, local.
#        neutts[all] is installed by Hermes's install.sh [voice] extra.
#
# CLI Interactive Voice is disabled because the OCI VM is headless.
# The gateway voice modes (Auto Voice Reply + Discord Voice Channels) work
# without a physical microphone — they receive audio over Discord's API.
# ---------------------------------------------------------------------------
stt:
  provider: "local"          # local Whisper — no external API, ARM64-safe
  local:
    model: "tiny"            # ~75 MB; base (~150 MB) is also fine if RAM permits

tts:
  provider: "neutts"         # on-device, no external API, ARM64-compatible
  # neutts block — defaults are used; voice can be tuned after first deploy.
  # See: https://hermes-agent.nousresearch.com/docs/user-guide/features/voice-mode

voice:
  # CLI interactive voice disabled — VM is headless, no physical microphone.
  record_key: ""
  max_recording_seconds: 0
  auto_tts: false            # Gateway TTS (Discord) is controlled by discord.voice below
  beep_enabled: false        # no speaker on headless VM
  silence_threshold: 200
  silence_duration: 3.0

# ---------------------------------------------------------------------------
# Discord integration
# Bot must have Privileged Intents enabled in the Developer Portal:
#   - Message Content Intent
#   - Voice State Intent  (for Discord Voice Channel mode)
#   - Server Members Intent  (optional, for role-based access control)
#
# See templates/oracle-cloud/hermes-agent/SETUP.md for the full walkthrough.
#
# DISCORD_BOT_TOKEN is in .env, not here.
# ---------------------------------------------------------------------------
discord:
  require_mention: true      # bot only replies when @mentioned (safe default)
  auto_thread: true          # auto-create threads per conversation
  reactions: true            # show 👀✅❌ emoji feedback
  free_response_channels: "" # comma-separated channel IDs that skip @mention
  bot_token: ${DISCORD_BOT_TOKEN}
  home_channel_name: ${DISCORD_HOME_CHANNEL_NAME}
  # Optional: home_channel ID (auto-resolved from name on bot startup, or
  # set explicitly via /sethome in Discord after the bot connects)
  # home_channel: ${DISCORD_HOME_CHANNEL_ID}
  # The "application channel" (user-facing conversation channel) is
  # currently informational only — Hermes itself doesn't gate on it as
  # of 2026-05-14, but storing it surfaces it in logs and reserves the
  # slot for future Hermes versions.
  app_channel_name: ${DISCORD_APP_CHANNEL_NAME}
  # Voice channel configuration
  # auto_voice_reply: transcribe voice messages in text channels → reply
  # voice_channels:   bot joins VC, listens, and speaks back via TTS
  # Both are enabled; voice_channels requires the Voice State Intent above.
  auto_voice_reply: true
  voice_channels: true

# ---------------------------------------------------------------------------
# Terminal backend — local (runs on the OCI VM itself)
# ---------------------------------------------------------------------------
terminal:
  backend: local
  cwd: "/home/opc/hermes-agent/data"
  timeout: 180
  persistent_shell: true

# ---------------------------------------------------------------------------
# Memory + agent behaviour
# ---------------------------------------------------------------------------
memory:
  memory_enabled: true
  user_profile_enabled: true

agent:
  max_turns: 90
  reasoning_effort: ""

# ---------------------------------------------------------------------------
# Display — optimised for headless/gateway (no ANSI chrome)
# ---------------------------------------------------------------------------
display:
  tool_progress: all
  streaming: false
  compact: true
  language: ja              # change to "en" if you prefer English responses
